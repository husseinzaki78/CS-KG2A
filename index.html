<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام KG2-A المطوّر</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root {
  --primary: #1a4f7a;
  --primary-light: #e8f4fd;
  --accent: #f0a500;
  --success: #16a34a;
  --danger: #dc2626;
  --warning: #d97706;
  --bg: #f0f5fa;
  --card: #ffffff;
  --text: #1e293b;
  --muted: #64748b;
  --border: #d1e3f0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); direction: rtl; }

/* ── HEADER ── */
header {
  background: linear-gradient(135deg, #1a4f7a, #0d3057);
  color: white; padding: 16px 20px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 4px 20px rgba(26,79,122,0.3);
  position: sticky; top: 0; z-index: 100;
}
.logo { width: 46px; height: 46px; background: var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
header h1 { font-size: 18px; font-weight: 900; }
header p { font-size: 12px; opacity: 0.75; }
.header-badge { margin-right: auto; background: rgba(240,165,0,0.2); border: 1px solid var(--accent); color: var(--accent); padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; white-space: nowrap; }

/* ── TABS ── */
.tabs { display: flex; background: white; border-bottom: 2px solid var(--border); position: sticky; top: 78px; z-index: 99; }
.tab { flex: 1; padding: 14px 8px; text-align: center; font-size: 13px; font-weight: 700; color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }

/* ── PAGE ── */
.page { display: none; padding: 16px; }
.page.active { display: block; }

/* ── SEARCH BAR ── */
.search-wrap { position: relative; margin-bottom: 14px; }
.search-wrap input { width: 100%; padding: 12px 44px 12px 16px; border: 2px solid var(--border); border-radius: 12px; font-family: 'Cairo', sans-serif; font-size: 14px; outline: none; background: white; direction: rtl; }
.search-wrap input:focus { border-color: var(--primary); }
.search-wrap .si { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 18px; color: var(--muted); pointer-events: none; }

/* ── ACTION ROW ── */
.action-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.count-badge { background: var(--primary-light); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 700; color: var(--primary); }

/* ── BUTTONS ── */
.btn { padding: 9px 18px; border-radius: 10px; border: none; font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; }
.btn-primary { background: var(--primary); color: white; }
.btn-accent { background: var(--accent); color: white; }
.btn-success { background: var(--success); color: white; }
.btn-danger { background: var(--danger); color: white; }
.btn-outline { background: white; color: var(--primary); border: 2px solid var(--border); }
.btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }

/* ── CONTACT CARD ── */
.contact-card {
  background: white; border-radius: 14px; padding: 14px 16px;
  margin-bottom: 10px; border: 2px solid transparent;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 900; }
.av0{background:#dbeafe;color:#1d4ed8} .av1{background:#dcfce7;color:#15803d}
.av2{background:#fef9c3;color:#92400e} .av3{background:#fce7f3;color:#9d174d}
.card-name { font-size: 13px; font-weight: 700; }
.card-id { font-size: 11px; color: var(--muted); }
.email-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; }

/* ── MODALS ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: white; border-radius: 20px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
.modal-head { background: linear-gradient(135deg, #1a4f7a, #0d3057); color: white; padding: 18px; border-radius: 20px 20px 0 0; }
.modal-body { padding: 20px; }
.modal-foot { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
.fg { margin-bottom: 16px; }
.fg label { display: block; font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
.fg input, .fg select, .fg textarea { width: 100%; padding: 11px; border: 2px solid var(--border); border-radius: 10px; font-family: 'Cairo'; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1e293b; color: white; padding: 12px 24px; border-radius: 12px; transition: 0.3s; z-index: 9999; }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.ok { background: #15803d; }
.toast.err { background: #dc2626; }
</style>
</head>
<body>

<header>
  <div class="logo">🎒</div>
  <div>
    <h1>نظام KG2-A</h1>
    <p>إدارة أولياء الأمور</p>
  </div>
  <div class="header-badge" id="totalBadge">0 طالب</div>
  <button class="btn btn-sm" style="background:rgba(255,255,255,0.2);color:white;" onclick="showDataMenu()">⚙️</button>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('contacts')"><span class="tab-icon">👥</span>الطلاب</div>
  <div class="tab" onclick="switchTab('email')"><span class="tab-icon">✉️</span>إرسال</div>
  <div class="tab" onclick="switchTab('templates')"><span class="tab-icon">📝</span>القوالب</div>
</div>

<div class="page active" id="page-contacts">
  <div class="search-wrap">
    <span class="si">🔍</span>
    <input type="text" id="contactSearch" placeholder="ابحث باسم الطالب أو الرقم..." oninput="renderContacts()">
  </div>
  <div class="action-row">
    <span class="count-badge" id="contactCount">0 طالب</span>
    <button class="btn btn-primary btn-sm" onclick="openAddModal()">➕ إضافة طالب</button>
  </div>
  <div id="contactsList"></div>
</div>

<div class="page" id="page-email">
  <div style="padding:20px; text-align:center; color:var(--muted)">تم دمج خصائص الإرسال في النسخة الأصلية.</div>
</div>

<div class="page" id="page-templates">
  <div id="templatesList"></div>
</div>

<div class="overlay" id="dataMenuOverlay">
  <div class="modal">
    <div class="modal-head"><h2>⚙️ إدارة البيانات والملفات</h2></div>
    <div style="padding:20px; display:flex; flex-direction:column; gap:10px">
      
      <div style="font-weight:bold; font-size:12px; color:var(--muted); margin-bottom:5px">ملفات Excel (الأسرع والأسهل)</div>
      <button class="btn btn-success" style="width:100%; justify-content:center" onclick="exportToExcel()">📤 تصدير إلى Excel</button>
      <button class="btn btn-accent" style="width:100%; justify-content:center" onclick="document.getElementById('excelFile').click()">📥 استيراد من Excel</button>
      <input type="file" id="excelFile" accept=".xlsx, .xls" style="display:none" onchange="importFromExcel(event)">

      <hr style="margin:10px 0; border:0; border-top:1px solid #eee">
      
      <div style="font-weight:bold; font-size:12px; color:var(--muted); margin-bottom:5px">النسخ الاحتياطي للنظام (JSON)</div>
      <button class="btn btn-outline" style="width:100%; justify-content:center" onclick="exportData()">📤 تصدير JSON</button>
      <button class="btn btn-outline" style="width:100%; justify-content:center" onclick="document.getElementById('importFile').click()">📥 استيراد JSON</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      
      <button class="btn btn-outline" style="width:100%; justify-content:center; margin-top:10px" onclick="closeDataMenu()">إغلاق</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// البيانات الأساسية
let students = [];
let templates = [];

// دالة تصدير إلى Excel
function exportToExcel() {
  if (students.length === 0) { toast("لا يوجد طلاب لتصديرهم", "err"); return; }
  
  // تحضير البيانات لتكون رؤوس الأعمدة واضحة
  const excelData = students.map(s => ({
    "رقم الطالب": s.id,
    "اسم الطالب": s.name,
    "النوع": s.gender,
    "الجنسية": s.nationality,
    "الديانة": s.religion,
    "إيميل الأب": s.father,
    "هاتف الأب": s.fatherMobile,
    "إيميل الأم": s.mother,
    "هاتف الأم": s.motherMobile,
    "إيميل الطالب الرسمي": s.email
  }));

  const worksheet = XLSX.utils.json_to_sheet(excelData);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Students");
  
  // تحميل الملف
  XLSX.writeFile(workbook, `Students_KG2A_${new Date().toLocaleDateString()}.xlsx`);
  toast("✅ تم تصدير ملف الاكسل بنجاح", "ok");
}

// دالة استيراد من Excel
function importFromExcel(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(event) {
    try {
      const data = new Uint8Array(event.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      const firstSheetName = workbook.SheetNames[0];
      const worksheet = workbook.Sheets[firstSheetName];
      const jsonData = XLSX.utils.sheet_to_json(worksheet);

      if (jsonData.length === 0) { toast("الملف فارغ!", "err"); return; }

      // تحويل بيانات الاكسل إلى صيغة النظام
      const importedStudents = jsonData.map(row => ({
        id: row["رقم الطالب"] || row["id"] || Math.floor(Math.random()*10000),
        name: (row["اسم الطالب"] || row["name"] || "بدون اسم").toUpperCase(),
        gender: row["النوع"] || row["gender"] || "",
        nationality: row["الجنسية"] || row["nationality"] || "",
        religion: row["الديانة"] || row["religion"] || "",
        father: row["إيميل الأب"] || row["father"] || "",
        fatherMobile: row["هاتف الأب"] || row["fatherMobile"] || "",
        mother: row["إيميل الأم"] || row["mother"] || "",
        motherMobile: row["هاتف الأم"] || row["motherMobile"] || "",
        email: row["إيميل الطالب الرسمي"] || row["email"] || ""
      }));

      // دمج البيانات (يمكنك اختيار استبدالها بالكامل أو الإضافة عليها)
      if (confirm(`تم العثور على ${importedStudents.length} طالب. هل تريد استبدال القائمة الحالية؟`)) {
        students = importedStudents;
      } else {
        students = [...students, ...importedStudents];
      }

      saveToLocalStorage();
      renderContacts();
      closeDataMenu();
      toast("✅ تم استيراد البيانات بنجاح", "ok");
    } catch (err) {
      console.error(err);
      toast("❌ خطأ في قراءة ملف الاكسل", "err");
    }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = ''; // مسح القيمة لتمكين اختيار نفس الملف لاحقاً
}

// الدوال المساعدة (LocalStorage & UI)
function saveToLocalStorage() {
  localStorage.setItem('kg2a_students', JSON.stringify(students));
  localStorage.setItem('kg2a_templates', JSON.stringify(templates));
}

function loadFromLocalStorage() {
  const s = localStorage.getItem('kg2a_students');
  const t = localStorage.getItem('kg2a_templates');
  if (s) students = JSON.parse(s);
  if (t) templates = JSON.parse(t);
  renderContacts();
}

function renderContacts() {
  const list = document.getElementById('contactsList');
  const q = document.getElementById('contactSearch').value.toLowerCase();
  const filtered = students.filter(s => s.name.toLowerCase().includes(q) || String(s.id).includes(q));
  
  document.getElementById('contactCount').textContent = filtered.length + " طالب";
  document.getElementById('totalBadge').textContent = students.length + " طالب";

  if (filtered.length === 0) {
    list.innerHTML = '<div style="text-align:center; padding:40px; color:#aaa">لا يوجد طلاب</div>';
    return;
  }

  list.innerHTML = filtered.map(s => `
    <div class="contact-card">
      <div class="card-top">
        <div class="avatar av0">${s.name.substring(0,2)}</div>
        <div>
          <div class="card-name">${s.name}</div>
          <div class="card-id">ID: ${s.id}</div>
        </div>
      </div>
      <div style="font-size:11px; color:var(--muted)">
        ${s.father ? `<div>👨 الأب: ${s.father}</div>` : ''}
        ${s.mother ? `<div>👩 الأم: ${s.mother}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function showDataMenu() { document.getElementById('dataMenuOverlay').classList.add('open'); }
function closeDataMenu() { document.getElementById('dataMenuOverlay').classList.remove('open'); }
function switchTab(t) { 
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');
    document.getElementById('page-'+t).classList.add('active');
}

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 3000);
}

// تشغيل النظام
window.onload = loadFromLocalStorage;

</script>
</body>
</html>
